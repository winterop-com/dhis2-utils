[project]
name = "dhis2-browser"
version = "0.1.0"
description = "Playwright-based helpers for DHIS2 UI automation — PAT creation, dashboards, screenshots, maintenance app."
readme = "README.md"
authors = [{ name = "Morten Hansen", email = "morten@winterop.com" }]
requires-python = ">=3.13"
dependencies = [
  "dhis2-client",
  "playwright>=1.58",
  "pillow>=12",
  "typer>=0.24",
  "rich>=15",
  "pydantic>=2.13",
]

[project.scripts]
dhis2-browser = "dhis2_browser.cli:app"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
