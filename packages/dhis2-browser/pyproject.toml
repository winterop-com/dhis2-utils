[project]
name = "dhis2-browser"
version = "0.2.0"
description = "Playwright-based helpers for DHIS2 UI automation."
readme = "README.md"
authors = [{ name = "Morten Hansen", email = "morten@winterop.com" }]
requires-python = ">=3.13"
dependencies = [
  "dhis2-client",
  "pillow>=12.2.0",
  "playwright>=1.58",
  "pydantic>=2.13",
]

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
