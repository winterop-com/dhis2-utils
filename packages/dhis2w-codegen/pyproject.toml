[project]
name = "dhis2w-codegen"
version = "0.13.1"
description = "Version-aware DHIS2 client generator — emits pydantic models + resource classes from /api/schemas into dhis2w-client."
readme = "README.md"
authors = [{ name = "Morten Hansen", email = "morten@winterop.com" }]
requires-python = ">=3.13"
dependencies = [
  "dhis2w-client>=0.13.0,<0.14",
  "typer>=0.24",
  "rich>=15",
  "jinja2>=3.1.6",
  "httpx>=0.28",
  "pydantic>=2.13",
]

[project.scripts]
dhis2w-codegen = "dhis2w_codegen.cli:app"

# codegen is mounted under `dhis2 dev codegen` by the dev plugin
# (packages/dhis2w-core/src/dhis2w_core/plugins/dev/cli.py). No top-level
# entry-point registration — dev owns the namespace.

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
