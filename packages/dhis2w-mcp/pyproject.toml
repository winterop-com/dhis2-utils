[project]
name = "dhis2w-mcp"
version = "0.6.0"
description = "dhis2 FastMCP server — mounts plugins from dhis2w-core."
readme = "README.md"
authors = [{ name = "Morten Hansen", email = "morten@winterop.com" }]
requires-python = ">=3.13"
dependencies = [
  "dhis2w-core>=0.6.0,<0.7",
  "fastmcp>=3.2",
]

[project.optional-dependencies]
browser = ["dhis2w-browser>=0.6.0,<0.7"]

[project.scripts]
dhis2w-mcp = "dhis2w_mcp.server:main"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
