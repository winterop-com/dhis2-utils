site_name: dhis2w
site_description: Python toolkit for DHIS2 (client, CLI, MCP server, browser automation).
site_url: https://winterop-com.github.io/dhis2w-utils/
repo_url: https://github.com/winterop-com/dhis2w-utils
repo_name: winterop-com/dhis2w-utils
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # Five top-level tabs (Get started / Architecture / Client / CLI / MCP)
    # keep the surface-distinction visible up top while each tab carries its
    # own focused sidebar tree — splits the formerly 70-item flat sidebar
    # so the Python API surface (45 pages) gets its own home instead of
    # dominating every page's left rail.
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy

nav:
  # Five top-level tabs. The three surfaces (Client / CLI / MCP) get their
  # own tab; "Get started" carries the landing page, walkthroughs, guides,
  # examples index, and maintainer-facing pages (release, testing,
  # troubleshooting, decisions, lessons, roadmap); Architecture carries
  # the cross-cutting and per-plugin design docs.
  - Get started:
      - Home: index.md
      - Walkthrough: walkthrough.md
      - Local setup: local-setup.md
      - Guides:
          - Connecting to DHIS2: guides/connecting-to-dhis2.md
          - Visualizations + dashboards: guides/visualizations.md
          - Manual testing: manual-testing.md
      - Examples index: examples.md
      - Maintainers:
          - Codegen: codegen.md
          - Releasing to PyPI: releasing.md
          - Testing strategy: testing.md
          - Troubleshooting: troubleshooting.md
          - Decisions log: decisions.md
          - Lessons learned: lessons.md
          - Roadmap: roadmap.md
  - Architecture:
      - Overview: architecture/overview.md
      - Core:
          - Workspace layout: architecture/workspace.md
          - Naming conventions: architecture/conventions.md
          - Pluggable auth: architecture/auth.md
          - Profiles: architecture/profiles.md
          - Plugin runtime: architecture/plugins.md
          - External plugins: architecture/external-plugin.md
          - Browser automation: architecture/browser.md
      - Per-version typing:
          - Typed schemas: architecture/typed-schemas.md
          - Version-aware clients: architecture/versioning.md
          - "Schema diff: v41 -> v42 -> v43": architecture/schema-diff-v41-v42-v43.md
      - Plugins:
          - System module: architecture/system.md
          - Metadata CRUD: architecture/metadata-crud.md
          - Metadata plugin: architecture/metadata-plugin.md
          - Aggregate plugin: architecture/aggregate.md
          - Analytics plugin: architecture/analytics.md
          - Tracker plugin: architecture/tracker.md
          - Maintenance plugin: architecture/maintenance-plugin.md
          - User plugin: architecture/user-plugin.md
          - User groups + roles: architecture/user-groups-and-roles.md
          - Customize plugin: architecture/customize-plugin.md
          - Files plugin: architecture/files-plugin.md
          - Messaging plugin: architecture/messaging-plugin.md
          - Apps plugin: architecture/apps-plugin.md
          - Route plugin: architecture/route-plugin.md
          - Doctor plugin: architecture/doctor-plugin.md
  - Client:
      - Introduction: client/index.md
      - Tutorial: guides/client-tutorial.md
      - Architecture: architecture/client.md
      - Reference overview: api/index.md
      - Core:
          - Client + lifecycle: api/client.md
          - Auth providers: api/auth.md
          - Retry policy: api/retry-policy.md
          - Errors: api/errors.md
          - Envelopes + responses: api/envelopes.md
          - Route auth schemes: api/auth-schemes.md
          - Sharing: api/sharing.md
          - Generated-model helpers: api/generated.md
          - OpenAPI-derived models: api/oas.md
      - Plugin accessors:
          - System module: api/system.md
          - Tracker reads: api/tracker.md
          - Aggregate: api/aggregate.md
          - Analytics: api/analytics.md
          - Maintenance: api/maintenance.md
          - Metadata accessor: api/metadata-accessor.md
          - Customize: api/customize.md
          - Files: api/files.md
          - Messaging: api/messaging.md
          - Apps: api/apps.md
          - Validation + predictors: api/validation.md
      - Metadata authoring:
          - Visualizations + dashboards: api/visualizations.md
          - Maps: api/maps.md
          - Legend sets: api/legend-sets.md
          - Organisation units: api/organisation-units.md
          - Data elements: api/data-elements.md
          - Indicators: api/indicators.md
          - Program indicators: api/program-indicators.md
          - Data sets + sections: api/data-sets.md
          - Tracker schema: api/tracker-schema.md
          - Validation rules + predictors: api/validation-rules-predictors.md
          - SQL views: api/sql-views.md
          - Categories: api/categories.md
          - Category combos: api/category-combos.md
          - Category combo builder: api/category-combo-builder.md
          - Category option combos: api/category-option-combos.md
          - Category options: api/category-options.md
          - Attribute values: api/attribute-values.md
          - Option sets: api/option-sets.md
          - Program rules: api/program-rules.md
      - Streaming:
          - Data values (streaming): api/data-values.md
          - Analytics streaming: api/analytics-stream.md
      - Utilities:
          - JSON Patch ops: api/json-patch.md
          - Tasks module: api/tasks.md
          - Periods: api/periods.md
          - UIDs: api/uids.md
  - CLI:
      - Introduction: cli/index.md
      - Tutorial: guides/cli-tutorial.md
      - Architecture: architecture/cli.md
      - Reference: cli-reference.md
      - PAT helper: pat-helper.md
  - MCP:
      - Introduction: mcp/index.md
      - Tutorial: mcp/tutorial.md
      - Architecture: architecture/mcp.md
      - Reference: mcp-reference.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            members_order: source
            heading_level: 2
