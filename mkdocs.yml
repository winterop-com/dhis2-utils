site_name: dhis2-utils
site_description: Private DHIS2 tooling — client, CLI, MCP server, browser automation
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - search.highlight
    - search.share
    - content.code.copy

nav:
  - Home: index.md
  - Walkthrough: walkthrough.md
  - Local DHIS2 setup: local-setup.md
  - Guides:
      - Connecting to DHIS2 (Basic / PAT / OAuth2): guides/connecting-to-dhis2.md
  - Architecture:
      - Overview: architecture/overview.md
      - Workspace layout: architecture/workspace.md
      - Pluggable auth: architecture/auth.md
      - Profiles: architecture/profiles.md
      - Version-aware clients: architecture/versioning.md
      - dhis2-client shape: architecture/client.md
      - Metadata CRUD: architecture/metadata-crud.md
      - System module: architecture/system.md
      - Plugin runtime: architecture/plugins.md
      - dhis2 CLI: architecture/cli.md
      - dhis2-mcp server: architecture/mcp.md
  - Codegen: codegen.md
  - Testing strategy: testing.md
  - Playwright PAT helper: pat-helper.md
  - Lessons learned: lessons.md
  - Decisions log: decisions.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - claude-theme
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            members_order: source
            heading_level: 2
