name: Publish docs

# Builds the mkdocs-material site and deploys it to GitHub Pages.
#
# Triggers:
#   - push to `main` (with changes under docs/, mkdocs.yml, packages, or
#     workflow itself) — keeps the published site in lock-step with the repo.
#   - manual dispatch — re-publish without a code change.
#
# Uses GitHub's actions/deploy-pages flow (not the older `mkdocs gh-deploy`
# branch push). Configure once at
# https://github.com/winterop-com/dhis2w-utils/settings/pages — set Source =
# "GitHub Actions". After the first successful run the site is live at
# https://winterop-com.github.io/dhis2w-utils/.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "packages/**/src/**"
      - ".github/workflows/docs.yml"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # mkdocs-material's git-revision-date plugin needs full history
          # if we ever enable it; cheap to fetch and future-proof.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync workspace
        run: uv sync --all-packages --all-extras

      - name: Regenerate CLI + MCP reference (autogen pages)
        run: |
          make docs-cli
          make docs-mcp

      - name: Build site
        run: uv run mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
