name: Publish to PyPI

# Triggers:
#   - push of a `v*.*.*` tag (e.g. `v0.5.0`) — publishes every package whose
#     pyproject.toml matches the tag's stripped version (`0.5.0`).
#   - manual dispatch with an explicit version override.
#
# Authentication uses PyPI Trusted Publishing (OIDC). Configure on PyPI at
# https://pypi.org/manage/account/publishing/ for each `dhis2w-*` project,
# pointing the workflow file at `pypi-publish.yml` and the environment at
# `pypi`. No API tokens needed.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.5.0). Required for manual runs."
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Workspace members shipped to PyPI. Excludes `dhis2w-codegen` —
        # workspace-internal dev tool with no value to PyPI consumers.
        package:
          - dhis2w-client
          - dhis2w-core
          - dhis2w-cli
          - dhis2w-browser
          - dhis2w-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync workspace
        run: make install

      - name: Build wheel + sdist
        run: uv build --package ${{ matrix.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dhis2w-client
    permissions:
      # Trusted Publishing — PyPI verifies the OIDC token and accepts the
      # upload without an API key. Each dhis2w-* project on PyPI must be
      # configured with this workflow + environment.
      id-token: write
    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: List built artifacts
        run: ls -lah dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No `password` — trusted publishing handles auth via the OIDC
          # token minted by the `id-token: write` permission above.

  verify:
    name: Verify ${{ matrix.package }} from PyPI
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - dhis2w-client
          - dhis2w-core
          - dhis2w-cli
          - dhis2w-browser
          - dhis2w-mcp
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Compute target version from tag (or workflow_dispatch input)
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for every dhis2w-* ${{ steps.version.outputs.value }} on PyPI simple index
        # uv resolves against PyPI's simple index, which lags the per-project
        # JSON endpoint by several seconds. Poll the simple index — what uv
        # actually reads — and require every sibling package to be visible
        # before this verify job proceeds, since dhis2w-cli depends on
        # dhis2w-core which depends on dhis2w-client. If we only wait for
        # the one package being verified, uv can still fail to resolve a
        # transitive dep that the simple index has not yet caught up on.
        #
        # PEP 625 normalizes distribution filenames — hyphens in the project
        # name become underscores (`dhis2w-client` -> `dhis2w_client-...`).
        # Grep for the normalized form, otherwise the pattern never matches
        # newer-style sdist/wheel filenames.
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          PACKAGES="dhis2w-client dhis2w-core dhis2w-cli dhis2w-browser dhis2w-mcp"
          for pkg in $PACKAGES; do
            normalized="${pkg//-/_}"
            for i in $(seq 1 36); do
              if curl -fsSL "https://pypi.org/simple/${pkg}/" \
                | grep -qE "${normalized}-${VERSION}(\.tar\.gz|-[^ \"<>]*\.whl)"; then
                echo "${pkg} ${VERSION} on simple index (attempt ${i})"
                break
              fi
              if [ "${i}" = "36" ]; then
                echo "::error::${pkg} ${VERSION} did not appear on PyPI simple index within 180s"
                exit 1
              fi
              echo "attempt ${i}/36 for ${pkg}: not yet on simple index, sleeping 5s"
              sleep 5
            done
          done

      - name: Smoke-test ${{ matrix.package }}
        # Install the published wheel into a throwaway venv (uv's --no-project
        # keeps it isolated from the runner's checkout) and exercise it.
        # dhis2w-cli runs an actual command against the public play instance;
        # the others are import-only since they're libraries / stdio servers.
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          PKG="${{ matrix.package }}"
          MODULE="${PKG//-/_}"
          case "${PKG}" in
            dhis2w-cli)
              echo ">>> dhis2 --help (CLI tree builds)"
              uvx --refresh --from "dhis2w-cli==${VERSION}" dhis2 --help > /dev/null
              echo ">>> dhis2 system info against play.im.dhis2.org/dev-2-43"
              DHIS2_URL=https://play.im.dhis2.org/dev-2-43 \
              DHIS2_USERNAME=admin \
              DHIS2_PASSWORD=district \
              uvx --from "dhis2w-cli==${VERSION}" dhis2 system info
              ;;
            *)
              echo ">>> import ${MODULE}"
              uv run --no-project --with "${PKG}==${VERSION}" \
                python -c "import ${MODULE}; print(f'{${MODULE}.__name__} {${MODULE}.__file__}')"
              ;;
          esac
