name: E2E

on:
  # Nightly at 03:00 UTC — the fast CI workflow catches regressions per-PR,
  # this one catches anything that only shows up against a real DHIS2.
  schedule:
    - cron: "0 3 * * *"
  # Manual trigger from the Actions tab — useful after a dump update or when
  # you just want confirmation against the latest main.
  workflow_dispatch:

jobs:
  slow-tests:
    name: stack + make test-slow (v${{ matrix.dhis2_version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # One in-progress run per (branch, dhis2_version) pair. Per-job
    # concurrency (not workflow-level) so the v42 and v43 matrix jobs
    # don't cancel each other.
    concurrency:
      group: e2e-${{ github.ref }}-v${{ matrix.dhis2_version }}
      cancel-in-progress: true
    strategy:
      # Each version is independent; one failure shouldn't cancel the other.
      fail-fast: false
      matrix:
        dhis2_version: ["42", "43"]
    steps:
      - uses: actions/checkout@v4

      - name: Check DHIS2 dump is present
        run: |
          DUMP=infra/v${{ matrix.dhis2_version }}/dump.sql.gz
          if [ ! -f "$DUMP" ]; then
            echo "::error::$DUMP is missing — commit a small test dump to enable e2e tests."
            exit 1
          fi
          ls -lh "$DUMP"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync workspace
        run: make install

      - name: Install Playwright Chromium
        # Needed for the dhis2-browser PAT helper and any Playwright-driven
        # slow tests. --with-deps installs the Linux system libs for headless
        # Chromium on ubuntu-latest.
        run: uv run playwright install --with-deps chromium

      - name: Make infra/home writeable by container users
        # The DHIS2 image runs as `nobody` (uid 65534) and bind-mounts `infra/home/`
        # at `/opt/dhis2`. On Linux runners the host dir is owned by the checkout
        # user (uid 1001) with restrictive perms, so DHIS2 fails at startup with
        # "Directory /opt/dhis2 is not writeable". macOS Docker Desktop is loose
        # about bind-mount permissions, so local dev doesn't hit this.
        run: chmod -R a+rwX infra/home

      - name: Bring up DHIS2 stack and seed auth
        # CI needs the stack detached (not streaming logs like `make dhis2-run`
        # would), so call the infra-level target directly.
        run: make -C infra up-seeded
        env:
          DHIS2_VERSION: ${{ matrix.dhis2_version }}

      - name: Run slow test suite
        # `make test-slow` auto-sources infra/home/credentials/.env.auth when it
        # exists, so the PATs + OAuth2 client written by the seed step above
        # are picked up automatically.
        run: make test-slow

      - name: DHIS2 logs on failure
        if: failure()
        run: docker logs dhis2 2>&1 | tail -200 || true

      - name: Tear down stack
        if: always()
        run: make dhis2-down || true
