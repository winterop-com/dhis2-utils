connection.dialect = org.hibernate.dialect.PostgreSQLDialect
connection.driver_class = org.postgresql.Driver
connection.url = jdbc:postgresql://postgresql:5432/dhis
connection.username = dhis
connection.password = dhis
connection.schema = update

hibernate.show_sql = true
hibernate.format_sql = true

# WORKS!
route.remote_servers_allowed=http://*
# route.remote_servers_allowed=http://*,https://*
# route.remote_servers_allowed=http://host.docker.internal:8000
# route.remote_servers_allowed=http://host.docker.internal:8000,https://host.docker.internal:8000

# Allowed route URL must not have a path: http://host.docker.internal:8000/
# route.remote_servers_allowed=http://host.docker.internal:8000/
# route.remote_servers_allowed=http://host.docker.internal:8000/,https://host.docker.internal:8000/

# Used by DHIS2 to encrypt secrets stored in the DB (external API tokens, etc).
# Generate a fresh one per instance: `python3 -c 'import uuid; print(uuid.uuid4())'`
# For local dev the deterministic value below is fine; replace before any shared use.
encryption.password = c3e1d2ff-a593-415a-8e8c-6ebe23dfe044

# --- OAuth2 / OIDC (see docs/guides/connecting-to-dhis2.md for the full walkthrough) ---

# Mount Spring AS endpoints (/oauth2/authorize, /oauth2/token, /oauth2/jwks,
# /.well-known/openid-configuration). Without this: 404 on /oauth2/authorize.
oauth2.server.enabled = on

# Issuer URL baked into minted JWTs (the `iss` claim). Must be the URL clients
# actually reach DHIS2 at.
server.base.url = http://localhost:8080

# Accept JWT Bearer tokens at /api/*. Without this: API calls with a minted
# access token return 401 even though the token is cryptographically valid.
oidc.jwt.token.authentication.enabled = on

# Wire DHIS2's own login form as the user-authentication front-end of the AS.
# Without this: /oauth2/authorize returns 500 "No AuthenticationProvider found".
oidc.oauth2.login.enabled = on

# Register DHIS2's own AS as a "generic" OIDC provider so the API-side JWT
# validator can find it by issuer. Without this: API calls return 401 "Invalid
# issuer" even when the token is fine. All URIs must be spelled out — DHIS2's
# GenericOidcProviderConfigParser does NOT auto-discover from issuer_uri.
oidc.provider.dhis2.client_id         = dhis2-utils-local
oidc.provider.dhis2.client_secret     = dhis2-utils-local-secret-do-not-use-in-prod
oidc.provider.dhis2.issuer_uri        = http://localhost:8080
oidc.provider.dhis2.authorization_uri = http://localhost:8080/oauth2/authorize
oidc.provider.dhis2.token_uri         = http://localhost:8080/oauth2/token
oidc.provider.dhis2.jwk_uri           = http://localhost:8080/oauth2/jwks
oidc.provider.dhis2.user_info_uri     = http://localhost:8080/userinfo
oidc.provider.dhis2.redirect_url      = http://localhost:8765
oidc.provider.dhis2.scopes            = ALL
oidc.provider.dhis2.mapping_claim     = sub

# --- Audit + history (local dev: turn everything OFF) ---
# DHIS2 stores immutable audit rows on every data/metadata change, which blocks
# metadata deletion (E4030: "associated with another object: DataValueAudit").
# For a dev stack we want to freely create + delete throwaway objects, so we
# disable every audit and changelog channel DHIS2 exposes.
#
# All three matrices accept CREATE/UPDATE/DELETE/READ as a semicolon-separated list.
# `DISABLED` is the explicit "log nothing" sentinel — blank values fall back to DHIS2
# defaults (which DO log), so spell it out.
audit.metadata = DISABLED
audit.tracker = DISABLED
audit.aggregate = DISABLED

# Per-domain persistence toggles (defaults are "off" but we pin them for clarity).
metadata.audit.persist = off
tracker.audit.persist = off
aggregate.audit.persist = off

# Change-log tables (dataelement_audit, datavalueaudit, trackedentityattribute_audit, ...).
# These are the rows that block DE/OU deletion after any write.
changelog.aggregate = off
changelog.tracker = off

# In-memory audit queue (relayed to logger/file). Kept off so nothing leaks into logs either.
audit.inmemory-queue.enabled = off
audit.logger = off
audit.database = off
