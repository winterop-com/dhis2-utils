services:
  postgresql:
    build:
      context: .
      dockerfile: Dockerfile
      # postgis/postgis:17-3.5 (the base image in Dockerfile) is published as
      # linux/amd64 only. Build as amd64 explicitly so the resulting image
      # manifest matches the service-level platform pin below; otherwise on
      # arm64 hosts the build tags the image with the host arch and compose
      # rejects it at run-time.
      platforms:
        - linux/amd64
    platform: linux/amd64
    init: true
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dhis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dhis}
      POSTGRES_DB: ${POSTGRES_DB:-dhis}
      POSTGRES_HOST_AUTH_METHOD: md5
      TZ: ${TZ:-Europe/Oslo}
      DHIS2_USER: ${DHIS2_USER:-admin}
      DHIS2_PASSWORD: ${DHIS2_PASSWORD:-district}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb.sh:/docker-entrypoint-initdb.d/initdb.sh:ro
      - ./v${DHIS2_VERSION:-43}/dump.sql.gz:/docker-entrypoint-initdb.d/dhis-backup.gz:ro
    healthcheck:
      test: [ "CMD-SHELL", "[ -f /var/lib/postgresql/data/.init-complete ] && psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'SELECT 1' > /dev/null 2>&1" ]
      interval: 30s
      timeout: 10s
      retries: 360
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  glowroot-installer:
    image: debian:12-slim
    init: true
    container_name: glowroot-installer
    volumes:
      - ./home:/opt/dhis2:rw
      - ./glowroot/admin.json:/seed/admin.json:ro
    entrypoint:
      - bash
      - -c
      - |
        set -e
        if [ -f /opt/dhis2/glowroot/glowroot.jar ]; then
          echo '>>> glowroot already installed, refreshing admin.json'
          cp /seed/admin.json /opt/dhis2/glowroot/admin.json
          exit 0
        fi
        echo '>>> installing curl + unzip + ca-certificates...'
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y --no-install-recommends curl unzip ca-certificates >/dev/null
        echo '>>> downloading glowroot 0.14.6...'
        mkdir -p /tmp/gl /opt/dhis2/glowroot
        cd /tmp/gl
        curl -fsSL -o glowroot.zip \
          https://github.com/glowroot/glowroot/releases/download/v0.14.6/glowroot-0.14.6-dist.zip
        unzip -q glowroot.zip
        cp -r glowroot/. /opt/dhis2/glowroot/
        cp /seed/admin.json /opt/dhis2/glowroot/admin.json
        echo '>>> glowroot installed at /opt/dhis2/glowroot/'

  dhis2:
    init: true
    image: dhis2/core:${DHIS2_IMAGE_TAG:-2.43.0.0}
    pull_policy: always
    container_name: dhis2
    restart: always
    environment:
      JAVA_OPTS: "-Xms2g -Xmx4g -XX:+UseG1GC -javaagent:/opt/dhis2/glowroot/glowroot.jar"
    deploy:
      resources:
        limits:
          memory: 5g
    ports:
      - "8080:8080"
      - "4000:4000"
    volumes:
      - ./home:/opt/dhis2:rw
    depends_on:
      postgresql:
        condition: service_healthy
      glowroot-installer:
        condition: service_completed_successfully
    healthcheck:
      # Any final 2xx/3xx after following redirects = Tomcat + DHIS2 are up.
      # Generous 30s curl timeout + 60 retries to survive slow boots under
      # arm64 emulation of the linux/amd64 DHIS2 images (can take 8-15 min
      # for older versions). `start_period` gives Tomcat breathing room
      # during initial startup — without it, `docker compose up --wait`
      # gives up after ~90s (too tight for cold GHA runners, which is why
      # the nightly E2E workflow intermittently failed).
      test: ["CMD-SHELL", "curl -sL -o /dev/null -w '%{http_code}' --max-time 30 http://localhost:8080/ | grep -qE '^[23][0-9]{2}$'"]
      interval: 20s
      timeout: 35s
      retries: 60
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  analytics-trigger:
    image: debian:12-slim
    init: true
    container_name: analytics-trigger
    environment:
      DHIS2_USER: admin
      DHIS2_PASSWORD: district
    depends_on:
      dhis2:
        condition: service_healthy
    restart: on-failure
    entrypoint:
      - bash
      - -c
      - |
        set -e
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y --no-install-recommends curl ca-certificates >/dev/null
        echo 'Waiting 20s extra to be sure...'
        sleep 20
        echo 'Triggering analytics table generation...'
        # NOTE: `?skipPrograms=lxAQ7Zs9VYR` is intended as a workaround for
        # the v43 SQL grammar bug on Antenatal-Care event analytics
        # (BUGS.md #36 — `column "yearly" does not exist`), but DHIS2 v43
        # silently ignores the query parameter — the resulting job runs
        # with `skipPrograms: []` regardless. Tracked as part of #36 until
        # the upstream fix lands; left in place to make intent clear.
        RESPONSE=$$(curl -s -u "$${DHIS2_USER}:$${DHIS2_PASSWORD}" -X POST "http://dhis2:8080/api/resourceTables/analytics?skipPrograms=lxAQ7Zs9VYR")
        echo "$$RESPONSE"
        TASK_ID=$$(echo "$$RESPONSE" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)
        if [ -z "$$TASK_ID" ]; then
          echo 'Failed to parse task id from response!'
          exit 1
        fi
        echo "Polling analytics task $$TASK_ID ..."
        while true; do
          sleep 10
          STATUS=$$(curl -s -u "$${DHIS2_USER}:$${DHIS2_PASSWORD}" "http://dhis2:8080/api/system/tasks/ANALYTICS_TABLE/$$TASK_ID")
          if echo "$$STATUS" | grep -q '"completed":true'; then
            break
          fi
          if echo "$$STATUS" | grep -q '"level":"ERROR"'; then
            echo 'Analytics failed!'
            exit 1
          fi
          echo 'Still running...'
        done
        echo 'Analytics tables completed successfully!'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
